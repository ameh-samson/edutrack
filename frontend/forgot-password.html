<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — EduTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card" role="main">
      <!-- Logo -->
      <div class="auth-logo" aria-label="EduTrack">
        <img src="/assets/logo.svg" alt="" width="140" height="35" />
      </div>

      <!-- Step 1: Request reset (default view) -->
      <div id="step-request">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">
          Enter your registered email and matric number. We'll verify your
          identity and let you reset your password.
        </p>

        <div
          id="request-alert"
          class="alert hidden"
          role="alert"
          aria-live="polite"
        ></div>

        <form id="request-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">
              Email Address <span class="required" aria-hidden="true">*</span>
            </label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@university.edu"
              autocomplete="email"
              required
            />
            <span class="form-error" id="email-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="matricNumber">
              Matric / Student ID
              <span class="required" aria-hidden="true">*</span>
            </label>
            <input
              class="form-input"
              type="text"
              id="matricNumber"
              name="matricNumber"
              placeholder="e.g. 2460113247"
              required
            />
            <span
              class="form-error"
              id="matricNumber-error"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="btn btn--primary btn--full">
            Verify Identity
          </button>
        </form>
      </div>

      <!-- Step 2: Set new password (shown after verification) -->
      <div id="step-reset" style="display: none">
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle">Choose a strong password for your account.</p>

        <div
          id="reset-alert"
          class="alert hidden"
          role="alert"
          aria-live="polite"
        ></div>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="newPassword">
              New Password <span class="required" aria-hidden="true">*</span>
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="newPassword"
                name="newPassword"
                placeholder="Enter your password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="input-wrapper__toggle"
                aria-label="Show password"
              >
                <svg
                  class="icon-eye"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="icon-eye-off"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45
                    18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11
                    8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span
              class="form-error"
              id="newPassword-error"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">
              Confirm Password
              <span class="required" aria-hidden="true">*</span>
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Enter your password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="input-wrapper__toggle"
                aria-label="Show password"
              >
                <svg
                  class="icon-eye"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="icon-eye-off"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45
                    18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11
                    8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span
              class="form-error"
              id="confirmPassword-error"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="btn btn--primary btn--full">
            Reset Password
          </button>
        </form>
      </div>

      <p class="auth-footer">
        <a href="/index.html">← Back to Sign In</a>
      </p>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/forgot-password.js"></script>
  </body>
</html>
